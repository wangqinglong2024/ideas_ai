# ==============================================================================
# 内观 AI 认知镜 - 生产环境 Docker Compose
# 加入全局网关网络，容器名 ideas-backend:8080 / ideas-frontend:80
# ==============================================================================

services:
  # --------------------------------------------------------------------------
  # FastAPI 后端（全异步，内网 8080）
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ideas-backend
    restart: always
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 访问宿主机 Dify/Supabase
    expose:
      - "8080"
    networks:
      - gateway_net
      - global-data-link
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend/certs:/app/certs:ro         # 微信支付私钥证书（只读）

  # --------------------------------------------------------------------------
  # React 前端（Nginx 托管 Vite 构建产物，内网 80）
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ideas-frontend
    restart: always
    expose:
      - "80"
    networks:
      - gateway_net
      - global-data-link
    depends_on:
      backend:
        condition: service_healthy

# ==============================================================================
# 网络（外部已创建，不重建）
# ==============================================================================
networks:
  gateway_net:
    external: true
  global-data-link:
    external: true
