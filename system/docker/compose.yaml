name: zhiyu

# =====================================================================
# 知语 dev 环境（Docker only） — 复用主机已部署的开源 Supabase 自托管栈
#
# 主机 Supabase 栈位于 supabase_default 外部网络，提供：
#   - supabase-db (supabase/postgres:15.x，含 auth/storage/realtime schemas)
#   - supabase-kong:8000 (统一网关；外部 :8000)
#   - supabase-auth / supabase-rest / supabase-storage / supabase-realtime
#   - supabase-studio / supabase-meta / supabase-edge-functions
#
# 本 compose 不再启动任何 supabase-* 容器，只启动：
#   - redis（zhiyu 专用）
#   - db-migrate（一次性，将 zhiyu schema 迁移到主机 supabase-db）
#   - api-app / api-admin / web-app / web-admin
#
# 数据库隔离：所有业务表都在 zhiyu schema 下，与 foryou 等其他项目隔离。
# 向量/AI：pgvector 由主机 supabase/postgres 镜像内置，但仅在确实需要 AI 向量
#   检索的迁移里 `create extension if not exists vector;`，本基线不启用。
# =====================================================================

networks:
  default:
    name: zhiyu_default
  supabase:
    name: supabase_default
    external: true

services:

  redis:
    image: redis:7-alpine
    container_name: zhiyu-redis
    restart: unless-stopped
    networks: [default]
    ports:
      - "6379:6379"

  db-migrate:
    image: postgres:16-alpine
    container_name: zhiyu-db-migrate
    networks: [supabase]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
    volumes:
      - ../supabase:/work/supabase:ro
      - ../scripts:/work/scripts:ro
    working_dir: /work
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        echo "[migrate] target = $$DATABASE_URL"
        for f in /work/supabase/migrations/*.sql; do
          echo "[migrate] -> $$f"; psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$$f"
        done
        echo "[seed] super-admin"
        psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 \
          -v admin_email="$$SUPER_ADMIN_EMAIL" \
          -v admin_pwd="$$SUPER_ADMIN_PASSWORD" \
          -f /work/supabase/seed.sql
        echo "[migrate] done."
    restart: "no"

  api-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      args:
        APP_NAME: api-app
    container_name: zhiyu-api-app
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks: [default, supabase]
    environment:
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      API_APP_PORT: ${API_APP_PORT}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      REDIS_URL: ${REDIS_URL}
      LOGIN_LOCK_THRESHOLD: ${LOGIN_LOCK_THRESHOLD}
      LOGIN_LOCK_WINDOW_MIN: ${LOGIN_LOCK_WINDOW_MIN}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - ../packages/shared-config/src:/repo/packages/shared-config/src
      - ../packages/shared-schemas/src:/repo/packages/shared-schemas/src
      - ../packages/shared-utils/src:/repo/packages/shared-utils/src
      - ../packages/shared-i18n/src:/repo/packages/shared-i18n/src
      - ../packages/supabase-client/src:/repo/packages/supabase-client/src
      - ../packages/ai-adapters/src:/repo/packages/ai-adapters/src
      - ../apps/api-app/src:/repo/apps/api-app/src
    ports:
      - "${API_APP_PORT}:8100"

  api-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      args:
        APP_NAME: api-admin
    container_name: zhiyu-api-admin
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    networks: [default, supabase]
    environment:
      APP_ENV: ${APP_ENV}
      API_ADMIN_PORT: ${API_ADMIN_PORT}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - ../packages/shared-config/src:/repo/packages/shared-config/src
      - ../packages/shared-schemas/src:/repo/packages/shared-schemas/src
      - ../packages/shared-utils/src:/repo/packages/shared-utils/src
      - ../packages/supabase-client/src:/repo/packages/supabase-client/src
      - ../apps/api-admin/src:/repo/apps/api-admin/src
    ports:
      - "${API_ADMIN_PORT}:9100"

  web-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        APP_NAME: web-app
    container_name: zhiyu-web-app
    restart: unless-stopped
    networks: [default]
    environment:
      VITE_API_BASE_APP: ${VITE_API_BASE_APP}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    volumes:
      - ../packages/shared-config/src:/repo/packages/shared-config/src
      - ../packages/shared-i18n/src:/repo/packages/shared-i18n/src
      - ../packages/ui-kit/src:/repo/packages/ui-kit/src
      - ../apps/web-app/src:/repo/apps/web-app/src
      - ../apps/web-app/index.html:/repo/apps/web-app/index.html
    ports:
      - "${WEB_APP_PORT}:3100"

  web-admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        APP_NAME: web-admin
    container_name: zhiyu-web-admin
    restart: unless-stopped
    networks: [default]
    environment:
      VITE_API_BASE_ADMIN: ${VITE_API_BASE_ADMIN}
    volumes:
      - ../packages/shared-config/src:/repo/packages/shared-config/src
      - ../packages/shared-i18n/src:/repo/packages/shared-i18n/src
      - ../packages/ui-kit/src:/repo/packages/ui-kit/src
      - ../apps/web-admin/src:/repo/apps/web-admin/src
      - ../apps/web-admin/index.html:/repo/apps/web-admin/index.html
    ports:
      - "${WEB_ADMIN_PORT}:4100"
